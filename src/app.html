<!doctype html>
<html lang="%sveltekit.lang%" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

		<!-- InMobi Choice. Consent Manager Tag v3.0 (for TCF 2.3) -->
		<script type="text/javascript" async=true>
		(function() {
		  var host = "www.themoneytizer.com";
		  var element = document.createElement('script');
		  var firstScript = document.getElementsByTagName('script')[0];
		  var url = 'https://cmp.inmobi.com'
		    .concat('/choice/', '6Fv0cGNfc_bw8', '/', host, '/choice.js?tag_version=V3');
		  var uspTries = 0;
		  var uspTriesLimit = 3;
		  element.async = true;
		  element.type = 'text/javascript';
		  element.src = url;

		  firstScript.parentNode.insertBefore(element, firstScript);

		  function makeStub() {
		    var TCF_LOCATOR_NAME = '__tcfapiLocator';
		    var queue = [];
		    var win = window;
		    var cmpFrame;

		    function addFrame() {
		      var doc = win.document;
		      var otherCMP = !!(win.frames[TCF_LOCATOR_NAME]);

		      if (!otherCMP) {
		        if (doc.body) {
		          var iframe = doc.createElement('iframe');

		          iframe.style.cssText = 'display:none';
		          iframe.name = TCF_LOCATOR_NAME;
		          doc.body.appendChild(iframe);
		        } else {
		          setTimeout(addFrame, 5);
		        }
		      }
		      return !otherCMP;
		    }

		    function tcfAPIHandler() {
		      var gdprApplies;
		      var args = arguments;

		      if (!args.length) {
		        return queue;
		      } else if (args[0] === 'setGdprApplies') {
		        if (
		          args.length > 3 &&
		          args[2] === 2 &&
		          typeof args[3] === 'boolean'
		        ) {
		          gdprApplies = args[3];
		          if (typeof args[2] === 'function') {
		            args[2]('set', true);
		          }
		        }
		      } else if (args[0] === 'ping') {
		        var retr = {
		          gdprApplies: gdprApplies,
		          cmpLoaded: false,
		          cmpStatus: 'stub'
		        };

		        if (typeof args[2] === 'function') {
		          args[2](retr);
		        }
		      } else {
		        if(args[0] === 'init' && typeof args[3] === 'object') {
		          args[3] = Object.assign(args[3], { tag_version: 'V3' });
		        }
		        queue.push(args);
		      }
		    }

		    function postMessageEventHandler(event) {
		      var msgIsString = typeof event.data === 'string';
		      var json = {};

		      try {
		        if (msgIsString) {
		          json = JSON.parse(event.data);
		        } else {
		          json = event.data;
		        }
		      } catch (ignore) {}

		      var payload = json.__tcfapiCall;

		      if (payload) {
		        window.__tcfapi(
		          payload.command,
		          payload.version,
		          function(retValue, success) {
		            var returnMsg = {
		              __tcfapiReturn: {
		                returnValue: retValue,
		                success: success,
		                callId: payload.callId
		              }
		            };
		            if (msgIsString) {
		              returnMsg = JSON.stringify(returnMsg);
		            }
		            if (event && event.source && event.source.postMessage) {
		              event.source.postMessage(returnMsg, '*');
		            }
		          },
		          payload.parameter
		        );
		      }
		    }

		    while (win) {
		      try {
		        if (win.frames[TCF_LOCATOR_NAME]) {
		          cmpFrame = win;
		          break;
		        }
		      } catch (ignore) {}

		      if (win === window.top) {
		        break;
		      }
		      win = win.parent;
		    }
		    if (!cmpFrame) {
		      addFrame();
		      win.__tcfapi = tcfAPIHandler;
		      win.addEventListener('message', postMessageEventHandler, false);
		    }
		  };

		  makeStub();

		  var uspStubFunction = function() {
		    var arg = arguments;
		    if (typeof window.__uspapi !== uspStubFunction) {
		      setTimeout(function() {
		        if (typeof window.__uspapi !== 'undefined') {
		          window.__uspapi.apply(window.__uspapi, arg);
		        }
		      }, 500);
		    }
		  };

		  var checkIfUspIsReady = function() {
		    uspTries++;
		    if (window.__uspapi === uspStubFunction && uspTries < uspTriesLimit) {
		      console.warn('USP is not accessible');
		    } else {
		      clearInterval(uspInterval);
		    }
		  };

		  if (typeof window.__uspapi === 'undefined') {
		    window.__uspapi = uspStubFunction;
		    var uspInterval = setInterval(checkIfUspIsReady, 6000);
		  }

		  /* GPP (Global Privacy Platform) stub */
		  (function() {
		    if (typeof window.__gpp === 'function') return;
		    var gppQueue = [];
		    window.__gpp = function(cmd, cb, par) {
		      if (cmd === 'ping') {
		        if (typeof cb === 'function') {
		          cb({
		            gppVersion: '1.1',
		            cmpStatus: 'stub',
		            cmpDisplayStatus: 'hidden',
		            signalStatus: 'not ready',
		            supportedAPIs: [],
		            cmpId: 0,
		            sectionList: [],
		            applicableSections: [-1],
		            gppString: '',
		            parsedSections: {}
		          }, true);
		        }
		      } else {
		        gppQueue.push([cmd, cb, par]);
		      }
		      return gppQueue;
		    };
		    window.__gpp.a = gppQueue;

		    var GPP_LOCATOR = '__gppLocator';
		    if (!window.frames[GPP_LOCATOR]) {
		      if (document.body) {
		        var f = document.createElement('iframe');
		        f.style.cssText = 'display:none';
		        f.name = GPP_LOCATOR;
		        document.body.appendChild(f);
		      }
		    }

		    window.addEventListener('message', function(e) {
		      var json;
		      try { json = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; } catch(x) { return; }
		      if (json && json.__gppCall) {
		        var p = json.__gppCall;
		        window.__gpp(p.command, function(retVal, success) {
		          var msg = { __gppReturn: { returnValue: retVal, success: success, callId: p.callId } };
		          if (e.source) e.source.postMessage(typeof e.data === 'string' ? JSON.stringify(msg) : msg, '*');
		        }, p.parameter);
		      }
		    }, false);
		  })();
		})();
		</script>
		<!-- End InMobi Choice. Consent Manager Tag v3.0 (for TCF 2.3) -->

		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300 font-sans"
	>
		<div id="svelte">%sveltekit.body%</div>
	</body>
</html>
